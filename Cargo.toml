[package]
name = "dashplay"
version = "0.1.0"
edition = "2024"

[dependencies]
base64 = "0.22"
url = "2.5"
thiserror = "1.0"
axum = "0.8.9"
tower-http = { version = "0.6", features = ["cors"] }
bytes = "1"
futures-util = "0.3"
hyper = "1"
hyper-util = { version = "0.1", features = ["tokio"] }
reqwest = { version = "0.13.2", features = ["stream", "json", "gzip", "cookies"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "signal", "time"] }
anyhow = "1.0"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
tokio-rustls = "0.26"
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["io"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rustls = "0.23"
rustls-pemfile = "2"
rcgen = { version = "0.14.7", features = ["x509-parser", "pem"] }
http-body-util = "0.1"
http-body = "1"
widevine = "0.1.0"
pssh-box = "0.2.4"
aes = "0.8"
ctr = "0.9"
cbc = { version = "0.1", features = ["alloc"] }
hex = "0.4"
quick-xml = "0.39.2"
graphql_client = "0.16.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.6.1", features = ["derive"] }
dotenvy = "0.15.7"
mp4parse = { version = "0.17.0", features = ["unstable-api"] }
prost = "0.14.3"
mp4decrypt = "0.6.1"
rsmp4decrypt = "0.2.0"
widevine-proto = "0.1.0"
protobuf = "3.7"
futures = "0.3.32"
config = "0.15.22"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
tempfile = "3"
byteorder = "1.5.0"
dash-mpd = "0.20.2"
xsd-types = "0.9.6"

[build-dependencies]
prost-build = "0.14.1"
