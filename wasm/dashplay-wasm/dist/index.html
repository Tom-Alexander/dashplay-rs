<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dashplayrs WASM player</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
      }

      body {
        margin: 0 auto;
        max-width: 960px;
        padding: 1.5rem;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0 0 1rem;
      }

      form {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.9rem;
      }

      input,
      button {
        font: inherit;
      }

      input {
        padding: 0.5rem 0.65rem;
        border: 1px solid #444;
        border-radius: 0.4rem;
        background: #1b1b1b;
        color: inherit;
      }

      button {
        width: fit-content;
        padding: 0.55rem 1rem;
        border: 0;
        border-radius: 0.4rem;
        background: #3b82f6;
        color: white;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      video {
        width: 100%;
        background: #000;
        border-radius: 0.5rem;
      }

      #status {
        margin-top: 0.75rem;
        font-size: 0.9rem;
        color: #9ca3af;
        min-height: 1.25rem;
      }

      #error {
        margin-top: 0.5rem;
        color: #f87171;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>dashplay-rs</h1>
    <form id="play-form">
      <label>
        Manifest URL
        <input
          id="manifest-url"
          type="url"
          required
          value="https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd"
        />
      </label>
      <button id="play-button" type="submit">Play</button>
    </form>

    <video id="video" controls playsinline></video>
    <div id="status">Idle</div>
    <div id="error"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
